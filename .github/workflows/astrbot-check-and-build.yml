name: Check for astrbot new upsteam tag and build

on:
  schedule:
    # Runs daily
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional: upstream tag to build'
        required: false
        type: string
      upstream_repo:
        description: 'Optional: upstream repo URL for manual build'
        required: false
        default: 'https://github.com/AstrBotDevs/AstrBot.git'
        type: string
      upstream_branch:
        description: 'Optional: upstream branch for manual build'
        required: false
        default: 'main'
        type: string

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Needed to push to GitHub Packages
    env:
      UPSTREAM_REPO: https://github.com/AstrBotDevs/AstrBot.git
      WORKDIR: astrbot

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create workdir
        run: mkdir -p ./${{ env.WORKDIR }}

      - name: Resolve upstream source
        id: resolve_source
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REPO="${{ github.event.inputs.upstream_repo }}"
            BRANCH="${{ github.event.inputs.upstream_branch }}"

            if [ -n "${{ github.event.inputs.tag }}" ]; then
              TAG="${{ github.event.inputs.tag }}"
              COMMIT_SHA=$(git ls-remote "$REPO" "refs/tags/$TAG^{}" "refs/tags/$TAG" | tail -n 1 | cut -f1)
              echo "Using specified tag: $TAG from $REPO"
              echo "mode=tag" >> $GITHUB_OUTPUT
              echo "tag=$TAG" >> $GITHUB_OUTPUT
              echo "ref_name=$TAG" >> $GITHUB_OUTPUT
            else
              COMMIT_SHA=$(git ls-remote --heads "$REPO" "$BRANCH" | awk 'NR==1 {print $1}')
              echo "Using latest commit from $REPO branch $BRANCH"
              echo "mode=branch" >> $GITHUB_OUTPUT
              echo "branch=$BRANCH" >> $GITHUB_OUTPUT
              echo "ref_name=$BRANCH" >> $GITHUB_OUTPUT
            fi
          else
            REPO="${{ env.UPSTREAM_REPO }}"
            TAG=$(git ls-remote --tags --sort="v:refname" "$REPO" | tail -n 1 | cut -d'/' -f3 | sed 's/\^{}//')
            COMMIT_SHA=$(git ls-remote "$REPO" "refs/tags/$TAG^{}" "refs/tags/$TAG" | tail -n 1 | cut -f1)
            echo "Latest tag from upstream is $TAG"
            echo "mode=tag" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "ref_name=$TAG" >> $GITHUB_OUTPUT
          fi

          if [ -z "$COMMIT_SHA" ]; then
            if [ -n "${BRANCH:-}" ]; then
              echo "Failed to resolve upstream branch '$BRANCH' from $REPO"
            elif [ -n "${TAG:-}" ]; then
              echo "Failed to resolve upstream tag '$TAG' from $REPO"
            else
              echo "Failed to resolve upstream commit SHA from $REPO"
            fi
            exit 1
          fi

          SHORT_SHA=$(printf '%s' "$COMMIT_SHA" | cut -c1-7)
          SAFE_REF=$(printf '%s' "${TAG:-$BRANCH}" | tr '/:@ ' '-' | tr -cd '[:alnum:]._-')
          SAFE_REPO=$(printf '%s' "$REPO" | tr '/:@ ' '-' | tr -cd '[:alnum:]._-')

          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "commit_sha_short=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "safe_ref=$SAFE_REF" >> $GITHUB_OUTPUT
          echo "safe_repo=$SAFE_REPO" >> $GITHUB_OUTPUT

      - name: Create cache directory
        run: mkdir -p ~/.cache/build-lock/${{ env.WORKDIR }}

      - name: Check cache for upstream revision
        id: cache-check
        uses: actions/cache@v4
        with:
          path: ~/.cache/build-lock/${{ env.WORKDIR }}
          key: build-lock-${{ steps.resolve_source.outputs.safe_repo }}-${{ steps.resolve_source.outputs.commit_sha }}

      - name: Clone upstream source code
        working-directory: ./${{ env.WORKDIR }}
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          if [ "${{ steps.resolve_source.outputs.mode }}" = "tag" ]; then
            git clone --depth 1 --branch "${{ steps.resolve_source.outputs.tag }}" "${{ steps.resolve_source.outputs.repo }}" AstrBot
          else
            git clone --depth 1 --branch "${{ steps.resolve_source.outputs.branch }}" "${{ steps.resolve_source.outputs.repo }}" AstrBot
          fi

      - name: Get upstream commit SHA
        working-directory: ./${{ env.WORKDIR }}
        id: get_upstream_sha
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          UPSTREAM_SHA=$(git -C ./AstrBot rev-parse --short HEAD)
          echo "Upstream commit SHA is $UPSTREAM_SHA"
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/outlook84/astrbot
          tags: |
            type=semver,pattern={{version}},value=${{ steps.resolve_source.outputs.tag }},enable=${{ steps.resolve_source.outputs.mode == 'tag' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.resolve_source.outputs.tag }},enable=${{ steps.resolve_source.outputs.mode == 'tag' }}
            type=semver,pattern={{major}},value=${{ steps.resolve_source.outputs.tag }},enable=${{ steps.resolve_source.outputs.mode == 'tag' }}
            type=raw,value=${{ steps.resolve_source.outputs.safe_ref }},enable=${{ steps.resolve_source.outputs.mode == 'branch' }}
            type=sha,sha=${{ steps.get_upstream_sha.outputs.upstream_sha }}
            latest

      - name: Build and push Docker image
        id: build-and-push
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: docker/build-push-action@v6
        with:
          context: "./${{ env.WORKDIR }}"
          platforms: "linux/amd64"
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print build status
        run: |
          if [ "${{ steps.cache-check.outputs.cache-hit }}" == "true" ]; then
            echo "Upstream commit ${{ steps.resolve_source.outputs.commit_sha_short }} has been built before. Skipping build."
          else
            echo "Upstream ${{ steps.resolve_source.outputs.ref_name }} @ ${{ steps.get_upstream_sha.outputs.upstream_sha }} built and pushed successfully."
          fi
