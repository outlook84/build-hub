name: mihomo build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'The version to build'
        required: true
        type: string

# Defines the permissions required by the jobs in this workflow.
# 'contents: write' is necessary for the release job to create a release and upload assets.
permissions:
  contents: write

jobs:
  # The 'build' job is responsible for compiling the Go application for different architectures.
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Defines a matrix of architectures to build for.
        goarch: [amd64, arm64]
    env:
      UPSTREAM_REPO: https://github.com/MetaCubeX/mihomo.git

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone upsteam source code
        run: git clone --depth 1 --branch ${{ github.event.inputs.tag }} ${{ env.UPSTREAM_REPO }}   

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: './mihomo/go.mod' # Automatically uses the Go version from your go.mod file

      - name: Build
        working-directory: ./mihomo
        run: |
          # The -ldflags strip debug info to reduce binary size.
          GOOS=linux GOARCH=${{ matrix.goarch }} go build -o mihomo-${{ matrix.goarch }} -tags no_fake_tcp -ldflags="-s -w"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-${{ matrix.goarch }} # Unique name for each artifact
          path: ./mihomo/mihomo-${{ matrix.goarch }}

  # The 'release' job runs after all 'build' jobs have completed successfully.
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build # This job depends on the 'build' job

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts # Download all artifacts into an 'artifacts' directory

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: mihomo release ${{ github.event.inputs.tag }}
          files: artifacts/**/mihomo-*